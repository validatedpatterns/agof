---
- name: "Pre-initialization the environment - setting and verifying config"
  hosts: localhost
  connection: local
  become: false
  gather_facts: false
  vars_files:
    - "./vars/preinit_vars.yml"
    - "~/agof_vault.yml"
  tasks:
    - name: "Write ansible.cfg"
      ansible.builtin.template:
        src: ansible.cfg.j2
        dest: '../ansible.cfg'
        mode: '0600'

    - name: Check if offline token is older than 30 days
      ansible.builtin.import_tasks: jwt_check.yml
      vars:
        local_token_name: "offline_token"
        local_token: "{{ offline_token }}"
      failed_when: false
      when:
        - offline_token is defined

    - name: "Verify pre-built collections are available"
      block:
        - name: "Check that pre-built collections directory exists"
          ansible.builtin.stat:
            path: "/usr/share/ansible/collections/ansible_collections"
          register: prebuilt_collections_dir

        - name: "Assert pre-built collections are present"
          ansible.builtin.assert:
            that:
              - prebuilt_collections_dir.stat.exists
              - prebuilt_collections_dir.stat.isdir
            fail_msg: >
              Pre-built collections not found at /usr/share/ansible/collections/ansible_collections.
              Are you running inside the agof-collections container?

    - name: "Assert that we have a valid target platform"
      ansible.builtin.assert:
        that:
          - agof_bootstrap_target | length > 0
          - agof_bootstrap_target in bootstrap_allowable_values
        fail_msg: "{{ agof_bootstrap_target }} is not a supported bootstrap target"
        success_msg: "Assertion passed: bootstrapping on {{ agof_bootstrap_target }}"

    - name: "Set our target bootstrap platform"
      ansible.builtin.set_fact:
        bootstrap_target: "{{ agof_bootstrap_target }}"
